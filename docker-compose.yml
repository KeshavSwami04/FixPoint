version: '3.9'

services:

  # ── MySQL database ───────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: fixpoint-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-StrongPass@1234}
      MYSQL_DATABASE:      ${DB_NAME:-instifix_db}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-StrongPass@1234}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Flask backend ────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: fixpoint-backend
    restart: unless-stopped
    environment:
      SECRET_KEY:    ${SECRET_KEY:-change-me-in-production}
      CRON_SECRET:   ${CRON_SECRET:-change-cron-secret}
      DB_HOST:       db
      DB_USER:       root
      DB_PASSWORD:   ${DB_PASSWORD:-StrongPass@1234}
      DB_NAME:       ${DB_NAME:-instifix_db}
      FRONTEND_URL:  ${FRONTEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  # ── React frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: fixpoint-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
